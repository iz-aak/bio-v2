  <main>
    <!-- HERO -->
    <section id="hero" class="hero">
      <img class="avatar" src="https://i.postimg.cc/1ttJqD1L/blue.jpg" alt="Izaak avatar" width="128" height="128" />
      <h1 class="name">Izaak</h1>
      <span class="status" data-discord-status>
        <span class="dot" data-status-dot></span>
        <span data-status-label>Loading…</span>
      </span>
      <p class="views" aria-live="polite">
        <span class="num" data-views-total>—</span> views
        <span class="sep">·</span>
        <span class="num" data-views-today>—</span> today
      </p>

      <article class="card lastplayed" aria-label="Last played track">
        <img data-lp-art alt="" width="56" height="56" />
        <div class="lp-meta">
          <span class="lp-label" data-lp-label>Last Played</span>
          <strong data-lp-title>—</strong>
          <span data-lp-artist>—</span>
        </div>
      </article>

      <a href="#socials" class="scrollhint" aria-label="Scroll down">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
      </a>
    </section>

    <!-- SOCIALS -->
    <section id="socials" class="section">
      <h2>Socials</h2>
      <div class="grid socials-grid">
        <a class="card social" href="/redirect?to=https%3A%2F%2Fdiscord.com%2Fusers%2F1329547310887207025">
          <span class="social-icon">DC</span>
          <span class="social-meta">
            <strong>Discord</strong>
            <span data-discord-handle>@uh.izaak</span>
          </span>
        </a>
        <a class="card social" href="/redirect?to=https%3A%2F%2Freddit.com%2Fuser%2Fssprix">
          <span class="social-icon">RD</span>
          <span class="social-meta">
            <strong>Reddit</strong>
            <span><span data-reddit-karma>200,193</span> karma</span>
          </span>
        </a>
        <a class="card social" href="/redirect?to=https%3A%2F%2Fgithub.com%2Fiz-aak">
          <span class="social-icon">GH</span>
          <span class="social-meta">
            <strong>GitHub</strong>
            <span data-github-latest>iz-aak</span>
          </span>
        </a>
        <a class="card social" href="/redirect?to=https%3A%2F%2Ftwitter.com%2Fuhizaak">
          <span class="social-icon">X</span>
          <span class="social-meta">
            <strong>Twitter / X</strong>
            <span>@uhizaak</span>
          </span>
        </a>
        <a class="card social" href="/redirect?to=https%3A%2F%2Finstagram.com%2Fuh.izaak">
          <span class="social-icon">IG</span>
          <span class="social-meta">
            <strong>Instagram</strong>
            <span>@uh.izaak</span>
          </span>
        </a>
        <a class="card social" href="/redirect?to=mailto%3Aizaak%40cc.cc">
          <span class="social-icon">@</span>
          <span class="social-meta">
            <strong>Email</strong>
            <span>izaak@cc.cc</span>
          </span>
        </a>
      </div>
    </section>

    <!-- PROJECTS -->
    <section id="projects" class="section">
      <h2>Projects</h2>
      <div class="grid projects-grid" data-projects></div>
    </section>

    <!-- STATS -->
    <section id="stats" class="section">
      <h2>Stats</h2>
      <div class="grid stats-grid" data-stats>
        <div class="card stat skel" aria-busy="true"></div>
        <div class="card stat skel" aria-busy="true"></div>
        <div class="card stat skel" aria-busy="true"></div>
        <div class="card stat skel" aria-busy="true"></div>
      </div>
    </section>

    <!-- GUESTBOOK -->
    <section id="guestbook" class="section">
      <h2>Guestbook</h2>
      <form class="card gb-form" data-gb-form novalidate>
        <div class="gb-row">
          <input name="name" maxlength="32" placeholder="Name" required autocomplete="nickname" />
          <input name="emoji" maxlength="2" placeholder="✨" class="gb-emoji" />
        </div>
        <textarea name="message" maxlength="200" placeholder="Leave a message…" required rows="3"></textarea>
        <div class="gb-actions">
          <span class="gb-count"><span data-gb-len>0</span>/200</span>
          <div class="cf-turnstile" data-turnstile></div>
          <button type="submit">Sign</button>
        </div>
        <p class="gb-msg" data-gb-msg role="status"></p>
      </form>
      <ul class="gb-list" data-gb-list>
        <li class="card skel gb-skel"></li>
        <li class="card skel gb-skel"></li>
        <li class="card skel gb-skel"></li>
      </ul>
      <button class="gb-more" data-gb-more hidden>Load more</button>
    </section>

    <!-- CATS -->
    <section id="cats" class="section">
      <h2>Cats <span aria-hidden="true">❤️</span></h2>
      <div class="cats-grid" data-cats>
        <button class="cat" data-src="https://i.postimg.cc/76kXKjzK/20250927-154236.jpg"><img loading="lazy" src="https://i.postimg.cc/76kXKjzK/20250927-154236.jpg" alt="cat" /></button>
        <button class="cat" data-src="https://i.postimg.cc/JhWb8ZhZ/20260221-202453.jpg"><img loading="lazy" src="https://i.postimg.cc/JhWb8ZhZ/20260221-202453.jpg" alt="cat" /></button>
        <button class="cat" data-src="https://i.postimg.cc/YCQWd0xS/20260219-125517.jpg"><img loading="lazy" src="https://i.postimg.cc/YCQWd0xS/20260219-125517.jpg" alt="cat" /></button>
        <button class="cat" data-src="https://i.postimg.cc/pr99zLd6/24116.jpg"><img loading="lazy" src="https://i.postimg.cc/pr99zLd6/24116.jpg" alt="cat" /></button>
        <button class="cat" data-src="https://i.postimg.cc/sgPMp8V7/20260124-224934.jpg"><img loading="lazy" src="https://i.postimg.cc/sgPMp8V7/20260124-224934.jpg" alt="cat" /></button>
        <button class="cat" data-src="https://i.postimg.cc/c6yJ3722/20251011-205832.jpg"><img loading="lazy" src="https://i.postimg.cc/c6yJ3722/20251011-205832.jpg" alt="cat" /></button>
      </div>
    </section>

    <footer id="footer" class="footer">

      <span class="loc">United Kingdom</span>
      <a href="/redirect?to=mailto%3Aadmin%40fluxtv.qzz.io">DMCA</a>
